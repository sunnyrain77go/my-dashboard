name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into config.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || vars.GEMINI_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID || vars.SHEET_ID }}
        run: |
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$SHEET_ID" ]; then
            echo "::error::Missing GEMINI_API_KEY or SHEET_ID. Set them in Secrets or Variables before deploy."
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path("js/config.js")
          content = path.read_text(encoding="utf-8")
          content = content.replace("%%GEMINI_API_KEY%%", os.environ["GEMINI_API_KEY"])
          content = content.replace("%%SHEET_ID%%", os.environ["SHEET_ID"])
          path.write_text(content, encoding="utf-8")
          PY

          if grep -q "%%GEMINI_API_KEY%%\|%%SHEET_ID%%" js/config.js; then
            echo "::error::Placeholder replacement failed in js/config.js"
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path

          content = Path("js/config.js").read_text(encoding="utf-8")
          gemini_line = next((line.strip() for line in content.splitlines() if "GEMINI_KEY" in line), "")
          sheet_line = next((line.strip() for line in content.splitlines() if "SHEET_ID" in line), "")

          def extract_value(line: str) -> str:
            parts = line.split("'", 2)
            return parts[1] if len(parts) >= 2 else ""

          gemini = extract_value(gemini_line)
          sheet = extract_value(sheet_line)

          print(f"Debug: GEMINI_KEY length in config.js = {len(gemini)}")
          print(f"Debug: SHEET_ID length in config.js   = {len(sheet)}")
          print(f"Debug: GEMINI placeholder left? {'%%GEMINI_API_KEY%%' in content}")
          print(f"Debug: SHEET placeholder left?  {'%%SHEET_ID%%' in content}")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
