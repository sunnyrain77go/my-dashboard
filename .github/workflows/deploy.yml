name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into config.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || vars.GEMINI_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID || vars.SHEET_ID }}
        run: |
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$SHEET_ID" ]; then
            echo "::error::Missing GEMINI_API_KEY or SHEET_ID. Set them in Secrets or Variables before deploy."
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          path = Path("js/config.js")
          old_content = path.read_text(encoding="utf-8")

          user_match = re.search(r"USER_NAME\s*:\s*'([^']*)'", old_content)
          user_name = user_match.group(1) if user_match else "Judy"

          data = {
              "GEMINI_KEY": os.environ["GEMINI_API_KEY"],
              "SHEET_ID": os.environ["SHEET_ID"],
              "USER_NAME": user_name,
          }

          header = (
              "// Auto-generated at deploy time by GitHub Actions.\n"
              "// Do not commit secrets to this file.\n\n"
          )
          new_content = header + "const CONFIG = " + json.dumps(data, ensure_ascii=False, indent=2) + ";\n"
          path.write_text(new_content, encoding="utf-8")
          PY

          if grep -q "%%GEMINI_API_KEY%%\|%%SHEET_ID%%" js/config.js; then
            echo "::error::config.js still contains placeholders"
            exit 1
          fi

          echo "Debug: GEMINI_API_KEY env length = ${#GEMINI_API_KEY}"
          echo "Debug: SHEET_ID env length      = ${#SHEET_ID}"

          python3 - <<'PY'
          from pathlib import Path
          import re

          content = Path("js/config.js").read_text(encoding="utf-8")
          gemini_match = re.search(r"GEMINI_KEY\s*:\s*'([^']*)'", content)
          sheet_match = re.search(r"SHEET_ID\s*:\s*'([^']*)'", content)
          gemini = gemini_match.group(1) if gemini_match else ""
          sheet = sheet_match.group(1) if sheet_match else ""

          print(f"Debug: GEMINI_KEY length in config.js = {len(gemini)}")
          print(f"Debug: SHEET_ID length in config.js   = {len(sheet)}")
          print(f"Debug: GEMINI placeholder left? {'%%GEMINI_API_KEY%%' in content}")
          print(f"Debug: SHEET placeholder left?  {'%%SHEET_ID%%' in content}")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
